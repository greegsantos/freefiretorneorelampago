<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalenguas - Expresión Oral</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0f0e0c;
            --bg-card: #1c1a17;
            --bg-elevated: #262320;
            --fg: #f0ebe3;
            --fg-muted: #8a857d;
            --accent: #ff6b35;
            --accent-hover: #ff8255;
            --accent-glow: rgba(255,107,53,0.25);
            --success: #2dd4a8;
            --success-dim: #1a3a32;
            --error: #ff4757;
            --error-dim: #3a1a1e;
            --warning: #ffc048;
            --warning-dim: #3a3018;
            --border: #33302b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

        /* Fondo animado */
        .bg-blobs {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-blobs::before, .bg-blobs::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12;
        }
        .bg-blobs::before {
            width: 600px; height: 600px; background: var(--accent);
            top: -200px; right: -100px;
            animation: blobFloat 20s ease-in-out infinite alternate;
        }
        .bg-blobs::after {
            width: 500px; height: 500px; background: var(--success);
            bottom: -200px; left: -100px;
            animation: blobFloat 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes blobFloat {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.15); }
            100% { transform: translate(-40px, 80px) scale(0.95); }
        }

        /* Pestañas de dificultad */
        .tab-btn {
            padding: 10px 24px; border-radius: 100px; font-weight: 600;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s;
            border: 2px solid var(--border); background: transparent; color: var(--fg-muted);
        }
        .tab-btn:hover { border-color: var(--fg-muted); color: var(--fg); }
        .tab-btn.active {
            background: var(--accent); border-color: var(--accent); color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Tarjetas de trabalenguas */
        .tw-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
        }
        .tw-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent-glow), transparent);
            opacity: 0; transition: opacity 0.35s;
        }
        .tw-card:hover { border-color: var(--accent); transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .tw-card:hover::before { opacity: 1; }
        .tw-card.selected { border-color: var(--accent); }
        .tw-card.selected::before { opacity: 1; }

        /* Badge de dificultad */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge-facil { background: var(--success-dim); color: var(--success); }
        .badge-medio { background: var(--warning-dim); color: var(--warning); }
        .badge-dificil { background: var(--error-dim); color: var(--error); }

        /* Texto del trabalenguas */
        .tw-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700; line-height: 1.5;
            color: var(--fg);
        }

        /* Palabras del resultado */
        .word-chip {
            display: inline-block; padding: 6px 14px; border-radius: 10px;
            font-size: 1.1rem; font-weight: 600; margin: 4px;
            transition: all 0.3s; position: relative;
            font-family: 'Space Grotesk', sans-serif;
        }
        .word-correct { background: var(--success-dim); color: var(--success); }
        .word-close { background: var(--warning-dim); color: var(--warning); }
        .word-wrong { background: var(--error-dim); color: var(--error); }
        .word-said {
            display: block; font-size: 0.75rem; font-weight: 400;
            color: var(--fg-muted); margin-top: 2px;
        }

        /* Botón de grabar */
        .rec-btn {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 2rem;
            transition: all 0.3s; position: relative; z-index: 1;
            box-shadow: 0 0 0 0 var(--accent-glow);
        }
        .rec-btn:hover { transform: scale(1.08);
            box-shadow: 0 0 30px var(--accent-glow); }
        .rec-btn:active { transform: scale(0.96); }
        .rec-btn.recording {
            background: var(--error);
            animation: recPulse 1.2s ease-in-out infinite;
        }
        @keyframes recPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
            50% { box-shadow: 0 0 0 24px rgba(255,71,87,0); }
        }

        /* Anillos de grabación */
        .rec-rings { position: absolute; width: 160px; height: 160px; }
        .rec-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid var(--accent); opacity: 0;
        }
        .recording .rec-ring {
            animation: ringExpand 2s ease-out infinite;
        }
        .recording .rec-ring:nth-child(2) { animation-delay: 0.6s; }
        .recording .rec-ring:nth-child(3) { animation-delay: 1.2s; }
        @keyframes ringExpand {
            0% { transform: scale(0.6); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Puntuación circular */
        .score-circle {
            width: 180px; height: 180px; position: relative;
        }
        .score-circle svg { transform: rotate(-90deg); }
        .score-circle .track { fill: none; stroke: var(--border); stroke-width: 8; }
        .score-circle .progress {
            fill: none; stroke-width: 8; stroke-linecap: round;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1),
                        stroke 0.5s;
        }
        .score-number {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .score-number .num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem; font-weight: 800; line-height: 1;
        }
        .score-number .label { font-size: 0.8rem; color: var(--fg-muted); margin-top: 4px; }

        /* Waveform */
        #waveform-canvas {
            width: 100%; height: 80px; border-radius: 12px;
            background: var(--bg-card);
        }

        /* Contador regresivo */
        .countdown-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(15,14,12,0.9); display: flex;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .countdown-overlay.active { opacity: 1; pointer-events: all; }
        .countdown-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem; font-weight: 800; color: var(--accent);
            animation: countPop 0.8s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes countPop {
            0% { transform: scale(2.5); opacity: 0; }
            40% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Confeti */
        .confetti-piece {
            position: fixed; width: 10px; height: 10px; z-index: 200;
            pointer-events: none;
        }

        /* Toast */
        .toast-container {
            position: fixed; top: 24px; right: 24px; z-index: 300;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 14px 20px; border-radius: 12px; font-weight: 500;
            font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
            animation: toastIn 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .toast-error { background: var(--error-dim); color: var(--error); border: 1px solid var(--error); }
        .toast-success { background: var(--success-dim); color: var(--success); border: 1px solid var(--success); }
        .toast-warning { background: var(--warning-dim); color: var(--warning); border: 1px solid var(--warning); }
        @keyframes toastIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Transiciones de vista */
        .view { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .view-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; position: absolute; }
        .view-visible { opacity: 1; transform: translateY(0); pointer-events: all; position: relative; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Mejor puntuación */
        .best-score-badge {
            position: absolute; top: 12px; right: 12px;
            background: var(--accent); color: #fff; font-size: 0.7rem;
            font-weight: 700; padding: 3px 10px; border-radius: 100px;
        }

        /* Mensaje de feedback */
        .feedback-msg {
            border-radius: 16px; padding: 20px 24px;
            font-size: 1rem; line-height: 1.6;
        }
        .feedback-excellent { background: var(--success-dim); border: 1px solid var(--success); color: var(--success); }
        .feedback-good { background: rgba(255,192,72,0.1); border: 1px solid var(--warning); color: var(--warning); }
        .feedback-regular { background: rgba(255,107,53,0.1); border: 1px solid var(--accent); color: var(--accent); }
        .feedback-poor { background: var(--error-dim); border: 1px solid var(--error); color: var(--error); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 640px) {
            .tw-text { font-size: 1.3rem; }
            .score-circle { width: 140px; height: 140px; }
            .score-number .num { font-size: 2.8rem; }
            .rec-btn { width: 80px; height: 80px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="bg-blobs" aria-hidden="true"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Contador regresivo -->
<div class="countdown-overlay" id="countdownOverlay">
    <div class="countdown-number" id="countdownNumber">3</div>
</div>

<div class="relative z-10 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="px-6 py-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 border-b" style="border-color: var(--border);">
        <div>
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight" style="color: var(--accent);">
                <i class="fas fa-language mr-2"></i>Trabalenguas
            </h1>
            <p class="text-sm mt-1" style="color: var(--fg-muted);">Practica tu expresión oral y mejora tu pronunciación</p>
        </div>
        <div class="flex gap-4 text-sm font-semibold">
            <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background: var(--bg-card); border: 1px solid var(--border);">
                <i class="fas fa-fire" style="color: var(--accent);"></i>
                <span id="streakCount">0</span> racha
            </div>
            <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background: var(--bg-card); border: 1px solid var(--border);">
                <i class="fas fa-check-circle" style="color: var(--success);"></i>
                <span id="completedCount">0</span> logrados
            </div>
        </div>
    </header>

    <main class="flex-1 px-4 sm:px-6 py-6 max-w-5xl mx-auto w-full">

        <!-- Vista: Selección -->
        <div id="selectorView" class="view view-visible">
            <!-- Pestañas -->
            <div class="flex flex-wrap gap-3 mb-8" role="tablist">
                <button class="tab-btn active" data-tab="facil" role="tab" aria-selected="true">
                    <i class="fas fa-seedling mr-1"></i> Facil
                </button>
                <button class="tab-btn" data-tab="medio" role="tab" aria-selected="false">
                    <i class="fas fa-tree mr-1"></i> Medio
                </button>
                <button class="tab-btn" data-tab="dificil" role="tab" aria-selected="false">
                    <i class="fas fa-mountain mr-1"></i> Dificil
                </button>
            </div>

            <!-- Grid de trabalenguas -->
            <div id="twGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- Vista: Práctica -->
        <div id="practiceView" class="view view-hidden">
            <button id="backBtn" class="flex items-center gap-2 mb-6 text-sm font-semibold transition-colors hover:opacity-80" style="color: var(--fg-muted);" aria-label="Volver a la selección">
                <i class="fas fa-arrow-left"></i> Volver
            </button>

            <!-- Badge y título -->
            <div class="mb-2" id="practiceBadge"></div>

            <!-- Texto del trabalenguas -->
            <div class="tw-text mb-8 p-6 rounded-2xl" style="background: var(--bg-card); border: 1px solid var(--border);" id="practiceText"></div>

            <!-- Botones de acción -->
            <div class="flex flex-col items-center gap-6 mb-8">
                <div class="flex gap-4">
                    <button id="listenBtn" class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all hover:scale-105" style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--fg);" aria-label="Escuchar pronunciación">
                        <i class="fas fa-volume-up"></i> Escuchar
                    </button>
                    <button id="hintBtn" class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all hover:scale-105" style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--fg);" aria-label="Ver pista">
                        <i class="fas fa-lightbulb"></i> Pista
                    </button>
                </div>

                <!-- Pista oculta -->
                <div id="hintBox" class="hidden w-full max-w-lg text-center text-sm rounded-xl p-4" style="background: var(--warning-dim); color: var(--warning); border: 1px solid var(--warning);"></div>

                <!-- Botón de grabar con anillos -->
                <div class="relative flex items-center justify-center" style="width: 160px; height: 160px;">
                    <div class="rec-rings" id="recRings">
                        <div class="rec-ring"></div>
                        <div class="rec-ring"></div>
                        <div class="rec-ring"></div>
                    </div>
                    <button class="rec-btn" id="recBtn" aria-label="Grabar">
                        <i class="fas fa-microphone" id="recIcon"></i>
                    </button>
                </div>
                <p class="text-sm font-medium" style="color: var(--fg-muted);" id="recStatus">
                    Presiona para grabar
                </p>

                <!-- Waveform -->
                <canvas id="waveformCanvas" class="hidden w-full max-w-lg"></canvas>
            </div>

            <!-- Resultados -->
            <div id="resultsPanel" class="hidden">
                <div class="rounded-2xl p-6 sm:p-8" style="background: var(--bg-card); border: 1px solid var(--border);">
                    <!-- Puntuación y mensaje -->
                    <div class="flex flex-col sm:flex-row items-center gap-8 mb-8">
                        <div class="score-circle" id="scoreCircle">
                            <svg viewBox="0 0 180 180" width="180" height="180">
                                <circle class="track" cx="90" cy="90" r="78"/>
                                <circle class="progress" id="scoreProgress" cx="90" cy="90" r="78"
                                    stroke-dasharray="490" stroke-dashoffset="490"/>
                            </svg>
                            <div class="score-number">
                                <span class="num" id="scoreNum">0</span>
                                <span class="label">de 10</span>
                            </div>
                        </div>
                        <div class="flex-1 text-center sm:text-left">
                            <div id="feedbackMsg" class="feedback-msg"></div>
                        </div>
                    </div>

                    <!-- Comparación palabra por palabra -->
                    <h3 class="text-lg font-bold mb-4" style="color: var(--fg);">
                        <i class="fas fa-text-width mr-2" style="color: var(--accent);"></i>Detalle palabra por palabra
                    </h3>
                    <div id="wordComparison" class="mb-6 flex flex-wrap"></div>

                    <!-- Lo que dijiste -->
                    <div id="saidSection" class="mb-6">
                        <h3 class="text-sm font-bold mb-2" style="color: var(--fg-muted);">
                            <i class="fas fa-microphone mr-2"></i>Lo que reconocimos:
                        </h3>
                        <p id="saidText" class="text-sm italic" style="color: var(--fg-muted);"></p>
                    </div>

                    <!-- Consejos -->
                    <div id="tipsSection" class="mb-6">
                        <h3 class="text-sm font-bold mb-2" style="color: var(--fg-muted);">
                            <i class="fas fa-lightbulb mr-2"></i>Consejos para mejorar:
                        </h3>
                        <ul id="tipsList" class="text-sm space-y-1" style="color: var(--fg-muted);"></ul>
                    </div>

                    <!-- Botones de acción -->
                    <div class="flex flex-wrap gap-3 justify-center">
                        <button id="retryBtn" class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all hover:scale-105" style="background: var(--accent); color: #fff;">
                            <i class="fas fa-redo"></i> Intentar de nuevo
                        </button>
                        <button id="nextTwBtn" class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all hover:scale-105" style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--fg);">
                            <i class="fas fa-forward"></i> Siguiente
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="px-6 py-4 text-center text-xs border-t" style="border-color: var(--border); color: var(--fg-muted);">
        <i class="fas fa-info-circle mr-1"></i>
        Funciona mejor con Google Chrome. Se requiere permiso del micrófono.
    </footer>
</div>

<script>
// ============================================================
// DATOS: Trabalenguas en español
// ============================================================
const trabalenguas = [
    {
        id: 1, texto: "Tres tristes tigres tragaban trigo en un trigal",
        dificultad: "facil", sonido: "R",
        pista: "Enfócate en la letra R, especialmente en 'tr' al principio de palabra"
    },
    {
        id: 2, texto: "Pablito clavó un clavito, qué clavito clavó Pablito",
        dificultad: "facil", sonido: "L / V",
        pista: "Presta atención a la diferencia entre 'clavó' y 'clavito', y la letra V"
    },
    {
        id: 3, texto: "El cielo está enladrillado, quién lo desenladrillará",
        dificultad: "facil", sonido: "L / R",
        pista: "Las sílabas 'lla' y 'dra' son clave, pronúncialas con claridad"
    },
    {
        id: 4, texto: "Como poco coco como, poco coco compro",
        dificultad: "facil", sonido: "C / O",
        pista: "Diferencia bien la C de 'como' y la C de 'coco', y la O repetida"
    },
    {
        id: 5, texto: "Erre con erre guitarra, erre con erre barril, rápido ruedan las ruedas del ferrocarril",
        dificultad: "medio", sonido: "RR / R",
        pista: "La RR y la R simple son diferentes: RR es más fuerte y vibrante"
    },
    {
        id: 6, texto: "La madre de María Montes miente por montes y miente por valles",
        dificultad: "medio", sonido: "M / N",
        pista: "Cuidado con la secuencia de M y N, no las confundas"
    },
    {
        id: 7, texto: "Me han dicho que has dicho un dicho que he dicho yo",
        dificultad: "medio", sonido: "CH / D",
        pista: "El sonido CH de 'dicho' es diferente a la D de 'dicho', articula cada uno"
    },
    {
        id: 8, texto: "Parra tenía una perra y Guerra tenía una parra, la perra de Parra subió a la parra de Guerra",
        dificultad: "medio", sonido: "P / G / RR",
        pista: "Distingue P de G al inicio y las RR de 'Parra' y 'perra'"
    },
    {
        id: 9, texto: "Tres tristes tigres tragaban trigo en un trigal, en tres tristes trastos tragaban tres tristes tigres",
        dificultad: "dificil", sonido: "TR / R",
        pista: "Es la versión extendida del clásico, domina el grupo 'tr' antes de intentarlo"
    },
    {
        id: 10, texto: "El perro de San Roque no tiene rabo porque Ramón Ramírez se lo ha cortado",
        dificultad: "dificil", sonido: "R / RR",
        pista: "Combina R simple y RR fuerte, practica cada palabra por separado primero"
    },
    {
        id: 11, texto: "Cuesta la cuesta y en la cuesta cuesta subir, y encima de la cuesta una cuestecita está",
        dificultad: "dificil", sonido: "C / S",
        pista: "La repetición de 'cuesta' con diferentes significados requiere ritmo y claridad"
    },
    {
        id: 12, texto: "Yo no como coco ni cocoa, el que come coco y cocoa, coco y cocoa come",
        dificultad: "dificil", sonido: "C / O",
        pista: "La alternancia entre 'coco' y 'cocoa' exige precisión en la terminación"
    }
];

// ============================================================
// ESTADO DE LA APLICACIÓN
// ============================================================
let state = {
    currentTab: 'facil',
    selectedTW: null,
    isRecording: false,
    recognition: null,
    audioContext: null,
    analyser: null,
    mediaStream: null,
    animFrameId: null,
    bestScores: {},
    streak: 0,
    completed: new Set(),
    lastRecognized: ''
};

// ============================================================
// VERIFICACIÓN DE COMPATIBILIDAD
// ============================================================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    document.addEventListener('DOMContentLoaded', () => {
        showToast('Tu navegador no soporta reconocimiento de voz. Usa Google Chrome.', 'error', 8000);
    });
}

// ============================================================
// ALGORITMO DE LEVENSHTEIN
// ============================================================
function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            dp[i][j] = a[i-1] === b[j-1]
                ? dp[i-1][j-1]
                : 1 + Math.min(dp[i-1][j-1], dp[i][j-1], dp[i-1][j]);
        }
    }
    return dp[m][n];
}

// ============================================================
// NORMALIZACIÓN DE TEXTO
// ============================================================
function normalizeText(text) {
    return text.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[.,;:!?¿¡""''()\-–—]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}

// ============================================================
// ANÁLISIS Y PUNTUACIÓN
// ============================================================
function analyzeSpeech(expectedText, recognizedText) {
    const expected = normalizeText(expectedText).split(' ');
    const recognized = normalizeText(recognizedText).split(' ');

    let wordResults = [];
    let usedIndices = new Set();

    for (let i = 0; i < expected.length; i++) {
        const expWord = expected[i];
        let bestMatch = null;
        let bestScore = 0;
        let bestIndex = -1;

        // Buscar la mejor coincidencia en un rango amplio
        for (let j = 0; j < recognized.length; j++) {
            if (usedIndices.has(j)) continue;

            const dist = levenshtein(expWord, recognized[j]);
            const maxLen = Math.max(expWord.length, recognized[j].length, 1);
            const similarity = 1 - (dist / maxLen);

            // Bonus por posición cercana
            const posBonus = 1 - Math.min(Math.abs(i - j) / Math.max(expected.length, 1), 1) * 0.15;
            const adjScore = similarity * posBonus;

            if (adjScore > bestScore) {
                bestScore = adjScore;
                bestMatch = recognized[j];
                bestIndex = j;
            }
        }

        if (bestScore >= 0.55 && bestIndex !== -1) {
            usedIndices.add(bestIndex);
            const isExact = bestScore >= 0.85;
            wordResults.push({
                expected: expWord,
                said: bestMatch,
                similarity: bestScore,
                status: isExact ? 'correct' : 'close'
            });
        } else {
            wordResults.push({
                expected: expWord,
                said: bestMatch || null,
                similarity: 0,
                status: 'wrong'
            });
        }
    }

    // Calcular puntuación
    const totalSim = wordResults.reduce((s, r) => s + r.similarity, 0);
    const avgSim = totalSim / Math.max(wordResults.length, 1);
    const rawScore = avgSim * 10;
    const score = Math.max(1, Math.min(10, Math.round(rawScore)));

    const correctCount = wordResults.filter(r => r.status === 'correct').length;
    const closeCount = wordResults.filter(r => r.status === 'close').length;
    const wrongCount = wordResults.filter(r => r.status === 'wrong').length;

    return { score, wordResults, correctCount, closeCount, wrongCount, totalWords: expected.length, avgSim };
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'success', duration = 4000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
    toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'opacity 0.3s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// ============================================================
// CONFETI
// ============================================================
function launchConfetti() {
    const colors = ['#ff6b35','#2dd4a8','#ffc048','#ff4757','#6c5ce7','#00cec9'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-20px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        document.body.appendChild(piece);

        const duration = 1500 + Math.random() * 2000;
        const xDrift = (Math.random() - 0.5) * 200;
        const rotation = Math.random() * 720;
        piece.animate([
            { transform: 'translateY(0) translateX(0) rotate(0deg)', opacity: 1 },
            { transform: `translateY(100vh) translateX(${xDrift}px) rotate(${rotation}deg)`, opacity: 0 }
        ], { duration, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }).onfinish = () => piece.remove();
    }
}

// ============================================================
// SÍNTESIS DE VOZ (Escuchar trabalenguas)
// ============================================================
function speakText(text) {
    if (!('speechSynthesis' in window)) {
        showToast('Tu navegador no soporta síntesis de voz', 'error');
        return;
    }
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = 0.75;
    utterance.pitch = 1;

    // Intentar encontrar una voz en español
    const voices = speechSynthesis.getVoices();
    const esVoice = voices.find(v => v.lang.startsWith('es'));
    if (esVoice) utterance.voice = esVoice;

    speechSynthesis.speak(utterance);
}

// ============================================================
// VISUALIZACIÓN DE AUDIO (Waveform)
// ============================================================
function startWaveform(stream) {
    const canvas = document.getElementById('waveformCanvas');
    canvas.classList.remove('hidden');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.audioContext = audioCtx;
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    state.analyser = analyser;

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;

    function draw() {
        if (!state.isRecording) return;
        state.animFrameId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0, 0, w, h);

        // Dibujar barras de frecuencia
        const barCount = 64;
        const barWidth = w / barCount;
        const step = Math.floor(bufferLength / barCount);

        for (let i = 0; i < barCount; i++) {
            const val = dataArray[i * step] / 255;
            const barH = Math.max(2, val * h * 0.85);
            const x = i * barWidth;
            const y = (h - barH) / 2;

            const gradient = ctx.createLinearGradient(x, y, x, y + barH);
            gradient.addColorStop(0, '#ff6b35');
            gradient.addColorStop(1, '#2dd4a8');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(x + 1, y, Math.max(1, barWidth - 2), barH, 2);
            ctx.fill();
        }
    }
    draw();
}

function stopWaveform() {
    if (state.animFrameId) cancelAnimationFrame(state.animFrameId);
    if (state.audioContext) { state.audioContext.close(); state.audioContext = null; }
    state.analyser = null;
    const canvas = document.getElementById('waveformCanvas');
    canvas.classList.add('hidden');
}

// ============================================================
// RECONOCIMIENTO DE VOZ
// ============================================================
function initRecognition() {
    if (!SpeechRecognition) return;

    const recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        state.lastRecognized = transcript;
        document.getElementById('recStatus').textContent = transcript || 'Escuchando...';
    };

    recognition.onend = () => {
        if (state.isRecording) {
            finishRecording();
        }
    };

    recognition.onerror = (event) => {
        console.error('Error de reconocimiento:', event.error);
        if (state.isRecording) {
            finishRecording();
            if (event.error === 'no-speech') {
                showToast('No se detectó voz. Intenta de nuevo hablando más fuerte.', 'warning');
            } else if (event.error === 'not-allowed') {
                showToast('Permiso de micrófono denegado. Actívalo en la configuración del navegador.', 'error', 6000);
            }
        }
    };

    state.recognition = recognition;
}

// ============================================================
// GRABACIÓN
// ============================================================
async function startCountdown() {
    if (state.isRecording) return;
    if (!state.recognition) {
        showToast('Reconocimiento de voz no disponible. Usa Google Chrome.', 'error');
        return;
    }

    const overlay = document.getElementById('countdownOverlay');
    const numEl = document.getElementById('countdownNumber');
    overlay.classList.add('active');

    for (let i = 3; i >= 1; i--) {
        numEl.textContent = i;
        numEl.style.animation = 'none';
        numEl.offsetHeight; // forzar reflow
        numEl.style.animation = 'countPop 0.8s cubic-bezier(0.4,0,0.2,1)';
        await new Promise(r => setTimeout(r, 900));
    }

    overlay.classList.remove('active');
    startRecording();
}

function startRecording() {
    state.isRecording = true;
    state.lastRecognized = '';

    const recBtn = document.getElementById('recBtn');
    const recIcon = document.getElementById('recIcon');
    const recStatus = document.getElementById('recStatus');
    const recRings = document.getElementById('recRings');

    recBtn.classList.add('recording');
    recIcon.className = 'fas fa-stop';
    recStatus.textContent = 'Escuchando...';
    recRings.classList.add('recording');

    // Ocultar resultados anteriores
    document.getElementById('resultsPanel').classList.add('hidden');

    // Iniciar reconocimiento
    try {
        state.recognition.start();
    } catch(e) {
        console.error('Error al iniciar reconocimiento:', e);
    }

    // Iniciar visualización de audio
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        state.mediaStream = stream;
        startWaveform(stream);
    }).catch(err => {
        console.warn('No se pudo acceder al micrófono para visualización:', err);
    });

    // Auto-stop después de 15 segundos
    state.recTimeout = setTimeout(() => {
        if (state.isRecording) {
            showToast('Tiempo límite alcanzado', 'warning');
            finishRecording();
        }
    }, 15000);
}

function finishRecording() {
    state.isRecording = false;
    clearTimeout(state.recTimeout);

    const recBtn = document.getElementById('recBtn');
    const recIcon = document.getElementById('recIcon');
    const recStatus = document.getElementById('recStatus');
    const recRings = document.getElementById('recRings');

    recBtn.classList.remove('recording');
    recIcon.className = 'fas fa-microphone';
    recRings.classList.remove('recording');

    // Detener reconocimiento
    try { state.recognition.stop(); } catch(e) {}

    // Detener audio
    stopWaveform();
    if (state.mediaStream) {
        state.mediaStream.getTracks().forEach(t => t.stop());
        state.mediaStream = null;
    }

    recStatus.textContent = 'Procesando...';

    // Dar un momento para que llegue el último resultado
    setTimeout(() => {
        processResult();
    }, 500);
}

function processResult() {
    const recognized = state.lastRecognized.trim();

    if (!recognized) {
        showToast('No se detectó voz. Intenta hablar más claro y cerca del micrófono.', 'warning');
        document.getElementById('recStatus').textContent = 'Presiona para grabar';
        return;
    }

    const tw = state.selectedTW;
    const analysis = analyzeSpeech(tw.texto, recognized);

    displayResults(analysis, recognized);
    document.getElementById('recStatus').textContent = 'Presiona para grabar';
}

// ============================================================
// MOSTRAR RESULTADOS
// ============================================================
function displayResults(analysis, recognized) {
    const panel = document.getElementById('resultsPanel');
    panel.classList.remove('hidden');

    // Puntuación animada
    const scoreNum = document.getElementById('scoreNum');
    const scoreProgress = document.getElementById('scoreProgress');
    const circumference = 2 * Math.PI * 78; // ~490

    // Color según puntuación
    let strokeColor;
    if (analysis.score >= 9) strokeColor = '#2dd4a8';
    else if (analysis.score >= 7) strokeColor = '#ffc048';
    else if (analysis.score >= 5) strokeColor = '#ff6b35';
    else strokeColor = '#ff4757';

    scoreProgress.style.stroke = strokeColor;
    scoreNum.style.color = strokeColor;

    // Animar número
    let currentScore = 0;
    const targetScore = analysis.score;
    const scoreInterval = setInterval(() => {
        currentScore++;
        scoreNum.textContent = currentScore;
        if (currentScore >= targetScore) clearInterval(scoreInterval);
    }, 120);

    // Animar progreso circular
    const targetOffset = circumference - (circumference * analysis.score / 10);
    setTimeout(() => {
        scoreProgress.style.strokeDashoffset = targetOffset;
    }, 100);

    // Mensaje de feedback
    const feedbackMsg = document.getElementById('feedbackMsg');
    let feedbackClass, feedbackIcon, feedbackTitle, feedbackText;

    if (analysis.score >= 9) {
        feedbackClass = 'feedback-excellent';
        feedbackIcon = 'fa-trophy';
        feedbackTitle = '¡Excelente!';
        feedbackText = 'Tu pronunciación es impecable. Sigue así, dominas este trabalenguas.';
    } else if (analysis.score >= 7) {
        feedbackClass = 'feedback-good';
        feedbackIcon = 'fa-thumbs-up';
        feedbackTitle = '¡Muy bien!';
        feedbackText = 'Casi lo logras. Repasa las palabras marcadas en amarillo y vuelve a intentarlo.';
    } else if (analysis.score >= 5) {
        feedbackClass = 'feedback-regular';
        feedbackIcon = 'fa-bullseye';
        feedbackTitle = 'Puedes mejorar';
        feedbackText = 'Hay varias palabras que necesitan práctica. Escucha el trabalenguas e intenta pronunciar cada palabra lentamente.';
    } else {
        feedbackClass = 'feedback-poor';
        feedbackIcon = 'fa-graduation-cap';
        feedbackTitle = 'Necesitas más práctica';
        feedbackText = 'No te desanimes. Escucha el trabalenguas primero y practica diciendo cada palabra por separado antes de intentar el trabalenguas completo.';
    }

    feedbackMsg.className = `feedback-msg ${feedbackClass}`;
    feedbackMsg.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
            <i class="fas ${feedbackIcon}"></i>
            <strong class="text-lg">${feedbackTitle}</strong>
        </div>
        <p>${feedbackText}</p>
    `;

    // Comparación palabra por palabra
    const wordComp = document.getElementById('wordComparison');
    wordComp.innerHTML = '';
    analysis.wordResults.forEach(r => {
        const chip = document.createElement('span');
        chip.className = `word-chip word-${r.status}`;
        let saidInfo = '';
        if (r.status === 'close' && r.said) {
            saidInfo = `<span class="word-said">Dijiste: ${r.said}</span>`;
        } else if (r.status === 'wrong') {
            if (r.said) {
                saidInfo = `<span class="word-said">Dijiste: ${r.said}</span>`;
            } else {
                saidInfo = `<span class="word-said">Omitida</span>`;
            }
        }
        chip.innerHTML = `${r.expected}${saidInfo}`;
        wordComp.appendChild(chip);
    });

    // Texto reconocido
    document.getElementById('saidText').textContent = `"${recognized}"`;

    // Consejos
    const tipsList = document.getElementById('tipsList');
    tipsList.innerHTML = '';
    const tips = generateTips(analysis);
    tips.forEach(tip => {
        const li = document.createElement('li');
        li.innerHTML = `<i class="fas fa-chevron-right mr-2" style="color: var(--accent); font-size: 0.7rem;"></i>${tip}`;
        tipsList.appendChild(li);
    });

    // Actualizar estadísticas
    updateStats(analysis);

    // Confeti para puntuaciones altas
    if (analysis.score >= 9) {
        setTimeout(launchConfetti, 400);
    }

    // Scroll a resultados
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generateTips(analysis) {
    const tips = [];
    const wrongWords = analysis.wordResults.filter(r => r.status === 'wrong');
    const closeWords = analysis.wordResults.filter(r => r.status === 'close');

    if (wrongWords.length > 0) {
        const wrongList = wrongWords.map(w => `<strong>${w.expected}</strong>`).join(', ');
        tips.push(`Presta especial atención a las palabras: ${wrongList}. Practícalas primero de forma aislada.`);
    }

    if (closeWords.length > 0) {
        const closeList = closeWords.map(w => `<strong>${w.expected}</strong>`).join(', ');
        tips.push(`Estuviste cerca con: ${closeList}. Repite lentamente esas sílabas.`);
    }

    // Consejo de sonido según el trabalenguas
    const tw = state.selectedTW;
    if (tw) {
        if (tw.sonido.includes('R') || tw.sonido.includes('RR')) {
            tips.push('Para la letra R: la R simple es un toque breve, la RR es más fuerte y vibrante. Practica vibrando la lengua.');
        }
        if (tw.sonido.includes('P') || tw.sonido.includes('G')) {
            tips.push('Diferencia P (explosiva labial) de G (explosiva velar). Pon la mano frente a la boca: con P sentirás aire.');
        }
        if (tw.sonido.includes('C') || tw.sonido.includes('S')) {
            tips.push('Cuidado con la C y la S: la C ante E/I se pronuncia como TH en algunas regiones, y la S es siempre silbante.');
        }
        if (tw.sonido.includes('L') || tw.sonido.includes('V')) {
            tips.push('La L es lateral (la lengua toca el paladar) y la V es labiodental (diente inferior toca labio superior).');
        }
        if (tw.sonido.includes('M') || tw.sonido.includes('N')) {
            tips.push('La M es bilabial (labios juntos) y la N es alveolar (lengua detrás de los dientes superiores).');
        }
    }

    if (analysis.score < 7) {
        tips.push('Consejo: escucha el trabalenguas primero con el botón "Escuchar" y repítelo palabra por palabra antes de intentarlo completo.');
    }

    tips.push('Habla a un ritmo moderado, ni muy rápido ni muy lento. La velocidad adecuada mejora la claridad.');

    return tips;
}

function updateStats(analysis) {
    const tw = state.selectedTW;
    const prevBest = state.bestScores[tw.id] || 0;

    if (analysis.score > prevBest) {
        state.bestScores[tw.id] = analysis.score;
    }

    if (analysis.score >= 7) {
        state.completed.add(tw.id);
        state.streak++;
    } else {
        state.streak = 0;
    }

    document.getElementById('streakCount').textContent = state.streak;
    document.getElementById('completedCount').textContent = state.completed.size;

    // Actualizar badge en la tarjeta
    renderGrid();
}

// ============================================================
// RENDERIZADO DEL GRID
// ============================================================
function renderGrid() {
    const grid = document.getElementById('twGrid');
    const filtered = trabalenguas.filter(tw => tw.dificultad === state.currentTab);

    grid.innerHTML = '';
    filtered.forEach(tw => {
        const card = document.createElement('div');
        card.className = `tw-card ${state.selectedTW && state.selectedTW.id === tw.id ? 'selected' : ''}`;
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', `Trabalenguas: ${tw.texto}`);

        const badgeClass = `badge-${tw.dificultad}`;
        const bestBadge = state.bestScores[tw.id]
            ? `<span class="best-score-badge"><i class="fas fa-star mr-1"></i>${state.bestScores[tw.id]}/10</span>`
            : '';

        card.innerHTML = `
            ${bestBadge}
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-3">
                    <span class="badge ${badgeClass}">${tw.dificultad}</span>
                    <span class="text-xs font-semibold" style="color: var(--fg-muted);">Sonido: ${tw.sonido}</span>
                </div>
                <p class="font-bold text-base leading-relaxed" style="font-family: 'Space Grotesk', sans-serif; color: var(--fg);">
                    ${tw.texto}
                </p>
            </div>
        `;

        card.addEventListener('click', () => selectTW(tw));
        card.addEventListener('keydown', (e) => { if (e.key === 'Enter') selectTW(tw); });
        grid.appendChild(card);
    });
}

// ============================================================
// SELECCIÓN DE TRABALENGUAS
// ============================================================
function selectTW(tw) {
    state.selectedTW = tw;

    // Cambiar vista
    const selectorView = document.getElementById('selectorView');
    const practiceView = document.getElementById('practiceView');

    selectorView.classList.remove('view-visible');
    selectorView.classList.add('view-hidden');

    setTimeout(() => {
        selectorView.style.display = 'none';
        practiceView.style.display = 'block';
        setTimeout(() => {
            practiceView.classList.remove('view-hidden');
            practiceView.classList.add('view-visible');
        }, 20);
    }, 300);

    // Llenar datos
    const badgeClass = `badge-${tw.dificultad}`;
    document.getElementById('practiceBadge').innerHTML = `
        <span class="badge ${badgeClass}">${tw.dificultad}</span>
        <span class="text-xs font-semibold ml-2" style="color: var(--fg-muted);">Sonido clave: ${tw.sonido}</span>
    `;
    document.getElementById('practiceText').textContent = tw.texto;
    document.getElementById('hintBox').classList.add('hidden');
    document.getElementById('resultsPanel').classList.add('hidden');

    // Reset progreso circular
    document.getElementById('scoreProgress').style.strokeDashoffset = '490';
    document.getElementById('scoreNum').textContent = '0';
}

function goBack() {
    const selectorView = document.getElementById('selectorView');
    const practiceView = document.getElementById('practiceView');

    // Si está grabando, detener
    if (state.isRecording) {
        state.isRecording = false;
        try { state.recognition.stop(); } catch(e) {}
        stopWaveform();
        if (state.mediaStream) {
            state.mediaStream.getTracks().forEach(t => t.stop());
            state.mediaStream = null;
        }
        clearTimeout(state.recTimeout);
        document.getElementById('recBtn').classList.remove('recording');
        document.getElementById('recIcon').className = 'fas fa-microphone';
        document.getElementById('recRings').classList.remove('recording');
    }

    speechSynthesis.cancel();

    practiceView.classList.remove('view-visible');
    practiceView.classList.add('view-hidden');

    setTimeout(() => {
        practiceView.style.display = 'none';
        selectorView.style.display = 'block';
        setTimeout(() => {
            selectorView.classList.remove('view-hidden');
            selectorView.classList.add('view-visible');
        }, 20);
    }, 300);

    state.selectedTW = null;
    renderGrid();
}

// ============================================================
// SIGUIENTE TRABALENGUAS
// ============================================================
function nextTrabalenguas() {
    if (!state.selectedTW) return;
    const sameDifficulty = trabalenguas.filter(tw => tw.dificultad === state.selectedTW.dificultad);
    const currentIndex = sameDifficulty.findIndex(tw => tw.id === state.selectedTW.id);
    const nextIndex = (currentIndex + 1) % sameDifficulty.length;

    speechSynthesis.cancel();
    document.getElementById('resultsPanel').classList.add('hidden');

    selectTW(sameDifficulty[nextIndex]);
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    // Cargar voces para síntesis
    if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    initRecognition();
    renderGrid();

    // Pestañas de dificultad
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-selected', 'false');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
            state.currentTab = btn.dataset.tab;
            renderGrid();
        });
    });

    // Botón escuchar
    document.getElementById('listenBtn').addEventListener('click', () => {
        if (state.selectedTW) speakText(state.selectedTW.texto);
    });

    // Botón pista
    document.getElementById('hintBtn').addEventListener('click', () => {
        const hintBox = document.getElementById('hintBox');
        if (hintBox.classList.contains('hidden')) {
            hintBox.classList.remove('hidden');
            hintBox.innerHTML = `<i class="fas fa-lightbulb mr-2"></i>${state.selectedTW.pista}`;
        } else {
            hintBox.classList.add('hidden');
        }
    });

    // Botón grabar
    document.getElementById('recBtn').addEventListener('click', () => {
        if (state.isRecording) {
            // Detener manualmente
            state.isRecording = false;
            clearTimeout(state.recTimeout);
            try { state.recognition.stop(); } catch(e) {}
            stopWaveform();
            if (state.mediaStream) {
                state.mediaStream.getTracks().forEach(t => t.stop());
                state.mediaStream = null;
            }
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recIcon').className = 'fas fa-microphone';
            document.getElementById('recRings').classList.remove('recording');

            setTimeout(() => processResult(), 500);
        } else {
            startCountdown();
        }
    });

    // Botón volver
    document.getElementById('backBtn').addEventListener('click', goBack);

    // Botón reintentar
    document.getElementById('retryBtn').addEventListener('click', () => {
        document.getElementById('resultsPanel').classList.add('hidden');
        document.getElementById('scoreProgress').style.strokeDashoffset = '490';
        document.getElementById('scoreNum').textContent = '0';
    });

    // Botón siguiente
    document.getElementById('nextTwBtn').addEventListener('click', nextTrabalenguas);
});
</script>
</body>
</html>
